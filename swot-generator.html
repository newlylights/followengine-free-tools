<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWOT Generator — Free Tool | FollowEngine</title>
<meta name="description" content="Generate a professional SWOT analysis for any competitor. Free, no signup required.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #09090b; color: #f4f4f5; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 60px 24px; }
.back { color: #22c55e; text-decoration: none; font-size: 0.9rem; margin-bottom: 32px; display: inline-block; }
h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; }
.subtitle { color: #a1a1aa; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
.form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #27272a; background: #18181b; color: #f4f4f5; font-size: 0.95rem; font-family: inherit; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: #22c55e; }
.btn { padding: 14px 32px; background: #22c55e; color: #000; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 8px; }
.btn:hover { background: #16a34a; }
.output { display: none; margin-top: 32px; }
.swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.swot-card { border-radius: 12px; padding: 20px; }
.swot-card h3 { font-size: 1rem; margin-bottom: 12px; }
.swot-card ul { list-style: none; }
.swot-card li { padding: 4px 0; font-size: 0.9rem; line-height: 1.4; }
.swot-s { background: #22c55e10; border: 1px solid #22c55e30; } .swot-s h3 { color: #22c55e; }
.swot-w { background: #ef444410; border: 1px solid #ef444430; } .swot-w h3 { color: #ef4444; }
.swot-o { background: #3b82f610; border: 1px solid #3b82f630; } .swot-o h3 { color: #3b82f6; }
.swot-t { background: #f59e0b10; border: 1px solid #f59e0b30; } .swot-t h3 { color: #f59e0b; }
.cta { text-align: center; margin-top: 48px; padding: 32px; background: #18181b; border: 1px solid #27272a; border-radius: 16px; }
.cta a { display: inline-block; background: #22c55e; color: #000; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-weight: 600; margin-top: 12px; }
.footer { text-align: center; padding: 40px 0; color: #71717a; font-size: 0.85rem; }
.footer a { color: #22c55e; text-decoration: none; }
.advice { background: #22c55e10; border: 1px solid #22c55e30; border-radius: 12px; padding: 16px; margin-top: 20px; }
.advice p { color: #22c55e; font-size: 0.9rem; line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back">← Back to Tools</a>
  <h1>📊 SWOT Analysis Generator</h1>
  <p class="subtitle">Create a structured SWOT analysis for any competitor.</p>

  <div class="form-group">
    <label>Competitor / Company Name *</label>
    <input type="text" id="swotName" placeholder="e.g., Competitor Inc.">
  </div>

  <div class="form-group">
    <label style="color:#22c55e">Strengths (one per line)</label>
    <textarea id="strengths" placeholder="Largest market share (41%)&#10;Strong brand recognition&#10;2,000+ integrations&#10;Best-in-class API docs"></textarea>
  </div>

  <div class="form-group">
    <label style="color:#ef4444">Weaknesses (one per line)</label>
    <textarea id="weaknesses" placeholder="NPS declining (-8 pts this year)&#10;Slow release cadence&#10;Enterprise onboarding takes 6+ weeks&#10;Mobile app rated 2.8★"></textarea>
  </div>

  <div class="form-group">
    <label style="color:#3b82f6">Opportunities (one per line)</label>
    <textarea id="opportunities" placeholder="SMB segment underserved by current pricing&#10;Growing market demand for AI features&#10;International expansion potential&#10;Strategic partnership opportunities"></textarea>
  </div>

  <div class="form-group">
    <label style="color:#f59e0b">Threats (one per line)</label>
    <textarea id="threats" placeholder="Our new AI features surpass theirs&#10;Open-source alternatives gaining traction&#10;Regulatory changes may impact business model&#10;New entrants with better UX"></textarea>
  </div>

  <button class="btn" onclick="generateSWOT()">Generate SWOT Analysis</button>

  <div class="output" id="output"></div>
  <div class="advice" id="advice" style="display:none"></div>

  <div class="cta">
    <p>🚀 Want automated competitor SWOTs that update in real time?</p>
    <a href="https://followengine.com">Try FollowEngine Free →</a>
  </div>
</div>

<div class="footer">
  Powered by <a href="https://followengine.com">FollowEngine</a> — Competitor Growth Intelligence Platform
</div>

<script>
function generateSWOT() {
  const name = document.getElementById('swotName').value.trim() || 'Competitor';
  const s = document.getElementById('strengths').value.trim().split('\n').filter(l=>l.trim());
  const w = document.getElementById('weaknesses').value.trim().split('\n').filter(l=>l.trim());
  const o = document.getElementById('opportunities').value.trim().split('\n').filter(l=>l.trim());
  const t = document.getElementById('threats').value.trim().split('\n').filter(l=>l.trim());

  let html = '<h3 style="margin-bottom:16px">SWOT Analysis: ' + name + '</h3>';
  html += '<p style="color:#71717a;font-size:0.85rem;margin-bottom:20px">Created: ' + new Date().toLocaleDateString() + '</p>';
  html += '<div class="swot-grid">';

  html += '<div class="swot-card swot-s"><h3>💪 Strengths (' + s.length + ')</h3><ul>';
  s.forEach(item => html += '<li>• ' + item + '</li>');
  html += '</ul></div>';

  html += '<div class="swot-card swot-w"><h3>⚠️ Weaknesses (' + w.length + ')</h3><ul>';
  w.forEach(item => html += '<li>• ' + item + '</li>');
  html += '</ul></div>';

  html += '<div class="swot-card swot-o"><h3>🚀 Opportunities (' + o.length + ')</h3><ul>';
  o.forEach(item => html += '<li>• ' + item + '</li>');
  html += '</ul></div>';

  html += '<div class="swot-card swot-t"><h3>⚠️ Threats (' + t.length + ')</h3><ul>';
  t.forEach(item => html += '<li>• ' + item + '</li>');
  html += '</ul></div>';

  html += '</div>';
  document.getElementById('output').innerHTML = html;
  document.getElementById('output').style.display = 'block';

  // Strategic advice
  const advice = document.getElementById('advice');
  let adviceText = '💡 <strong>Strategic Implications:</strong> ';
  if (w.length >= 3 && s.length >= 2) adviceText += 'Exploit their ' + w.length + ' weaknesses by positioning around ' + s[0].split('.')[0].toLowerCase() + '. ';
  if (o.length >= 2) adviceText += 'Act on "' + o[0].split('.')[0] + '" before they do. ';
  if (t.length >= 2) adviceText += 'Mitigate threat: ' + t[0].split('.')[0] + '.';
  advice.innerHTML = '<p>' + adviceText + '</p>';
  advice.style.display = 'block';
  document.getElementById('output').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
